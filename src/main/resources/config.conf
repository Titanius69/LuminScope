# ---------------------------------------------------------------------------
#  LuminScope
#
#  Proxy-side diagnostics. Works out of the box: the defaults sample the proxy,
#  measure latency on both sides and print conclusions with /luminscope.
#
#  Reload after editing with /luminscope reload.
# ---------------------------------------------------------------------------

sampling {
  # How often JVM counters, player latency and backend pings are taken.
  interval-seconds = 10

  # How much history the percentiles cover. Diagnostics want recent behaviour:
  # a proxy that was unhealthy this morning and is fine now should read as fine.
  window-minutes = 5

  # How long a backend ping may take before it counts as a failure.
  backend-timeout-seconds = 5

  # How often a no-op task is submitted to the proxy's I/O threads to measure
  # how long it waits. This is the single most useful number on a proxy, and the
  # probe itself costs almost nothing, so it runs far more often than anything
  # else here.
  event-loop-probe-millis = 250

  # Player round trip times are aggregated only, never stored per player.
  sample-client-latency = true
}

# Thresholds for the rule engine. Conservative on purpose: a tool that cries
# wolf gets muted, and a muted tool is worse than no tool because it creates the
# impression that someone is watching.
thresholds {
  # I/O thread scheduling delay, 99th percentile.
  event-loop-warning-millis = 50
  event-loop-critical-millis = 250

  # Fraction of maximum heap in use.
  heap-warning-fraction = 0.90

  # Collections per window whose average pause crossed 50 ms.
  long-gc-pauses-per-window = 3

  # Netty off-heap buffer usage. Steady growth here is a buffer leak.
  direct-memory-warning-mb = 512

  # Player to proxy round trip, 95th percentile.
  client-rtt-warning-millis = 250

  # Proxy to backend round trip, 95th percentile.
  backend-rtt-warning-millis = 100

  # Total server switch time, 99th percentile. The 99th matters more than the
  # median: if half of switches take 200 ms and one in a hundred takes eight
  # seconds, those players think the network is dead.
  switch-warning-millis = 5000

  # Refused connection attempts to one backend per window.
  switch-failures-per-window = 10

  # System load average divided by core count.
  load-per-core-warning = 0.90

  # A proxy serving a few thousand players needs a few dozen threads. Well above
  # that usually means a plugin creating executors it never shuts down.
  thread-count-warning = 200
}

# When the I/O threads stall, sample their stacks and work out which plugin is
# on them. Sampling only happens during a stall, so the cost is paid exactly
# when it does not matter.
blocking-detection {
  enabled = true

  # Scheduling delay that counts as a stall worth sampling.
  trigger-millis = 100

  max-suspects = 5
}

alerts {
  enabled = false
  webhook-url = ""

  # info, warning or critical.
  min-severity = "warning"

  # Each finding has its own cooldown. A genuinely blocked event loop produces
  # the same finding every window until it is fixed, and posting it every window
  # guarantees the channel gets muted before anyone fixes anything.
  cooldown-minutes = 30

  # Added to critical alerts only, e.g. "<@&123456789012345678>".
  mention = ""
}

prometheus {
  enabled = false

  # Binds to localhost by default. A metrics endpoint says a lot about a
  # network's internals; do not expose it without a reason.
  bind-address = "127.0.0.1"
  port = 9225
  path = "/metrics"

  # When set, requests must send "Authorization: Bearer <token>".
  bearer-token = ""
}

# Takes an unresponsive backend out of the routing rotation automatically.
#
# Off by default, and timid when on. Automation that fires at the wrong moment
# is worse than no automation: draining a healthy server because of a thirty
# second network blip turns a non-event into an outage. LuminScope will never
# drain the last server standing, never touches anything on never-remove, and
# announces every action it takes.
self-healing {
  enabled = false

  # Consecutive failed health checks before a backend is drained.
  unhealthy-checks = 4

  # Consecutive successes before it starts taking traffic again.
  recovery-checks = 6

  # Traffic is eased back over this many seconds rather than all at once. A
  # server that just came back has cold caches and an empty connection pool;
  # sending it the whole queued population is how it dies a second time.
  ramp-seconds = 120

  # Where players go while a backend is drained. Falls back to any healthy
  # server if none of these are available.
  fallback-servers = ["lobby-1", "lobby-2"]

  # Never taken out of rotation, whatever happens.
  never-remove = []
}

update-checker {
  enabled = true

  # Your SpigotMC resource id, the number in the resource URL. Set to 0 to
  # disable the check entirely.
  resource-id = 0

  interval-hours = 6
}
